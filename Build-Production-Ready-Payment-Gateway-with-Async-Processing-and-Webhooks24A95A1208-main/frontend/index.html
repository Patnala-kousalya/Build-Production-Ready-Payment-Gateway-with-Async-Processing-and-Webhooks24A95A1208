<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        .header {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .header h1 {
            margin: 0;
            color: white;
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .section {
            background-color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .section:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }
        .section h2 {
            color: #667eea;
            margin-top: 0;
            font-weight: 500;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .credential-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }
        .credential-item:last-child {
            border-bottom: none;
        }
        .credential-label {
            font-weight: 500;
            color: #555;
        }
        .credential-value {
            background-color: #f8f9fa;
            padding: 8px 12px;
            border-radius: 6px;
            font-family: monospace;
            color: #333;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        th, td {
            border: none;
            padding: 15px;
            text-align: left;
        }
        th {
            background-color: #667eea;
            color: white;
            font-weight: 500;
        }
        tr:nth-child(even) {
            background-color: #f8f9fa;
        }
        tr:hover {
            background-color: #e3f2fd;
        }
        .status-success {
            color: #28a745;
            font-weight: 500;
        }
        .status-failed {
            color: #dc3545;
            font-weight: 500;
        }
        .status-pending {
            color: #ffc107;
            font-weight: 500;
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            color: white;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Merchant Dashboard</h1>
    </div>
    <div class="container">
        <div class="dashboard-grid">
            <div class="section">
                <h2>API Credentials</h2>
                <div class="credential-item">
                    <span class="credential-label">API Key:</span>
                    <span class="credential-value">key_test_abc123</span>
                </div>
                <div class="credential-item">
                    <span class="credential-label">API Secret:</span>
                    <span class="credential-value">secret_test_xyz789</span>
                </div>
            </div>

            <div class="section">
                <h2>Webhook Configuration</h2>
                <input type="text" id="webhookUrl" placeholder="Enter webhook URL">
                <button onclick="saveWebhook()">Save Webhook</button>
                <div class="credential-item" style="margin-top: 20px;">
                    <span class="credential-label">Webhook Secret:</span>
                    <span class="credential-value">webhook_secret_xyz</span>
                </div>
            </div>

            <div class="section" style="grid-column: span 2;">
                <h2>Webhook Logs</h2>
                <table id="webhookLogs">
                    <thead>
                        <tr>
                            <th>Event</th>
                            <th>Status</th>
                            <th>Attempts</th>
                            <th>Last Attempt</th>
                            <th>Response Code</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Logs will be populated here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div class="footer">
        <p>&copy; 2026 Payment Gateway. All rights reserved.</p>
    </div>

    <script>
        function saveWebhook() {
            const url = document.getElementById('webhookUrl').value;
            if (url.trim() === '') {
                alert('Please enter a webhook URL');
                return;
            }
            // In real app, make API call
            alert('Webhook saved: ' + url);
            document.getElementById('webhookUrl').value = '';
        }

        // Mock data
        const mockLogs = [
            { event: 'payment.success', status: 'SUCCESS', attempts: 1, lastAttempt: '2024-01-01', responseCode: 200 },
            { event: 'payment.failed', status: 'FAILED', attempts: 3, lastAttempt: '2024-01-01', responseCode: 500 }
        ];

        function loadLogs() {
            const tbody = document.querySelector('#webhookLogs tbody');
            mockLogs.forEach(log => {
                const row = tbody.insertRow();
                row.insertCell(0).textContent = log.event;
                const statusCell = row.insertCell(1);
                statusCell.textContent = log.status;
                statusCell.className = `status-${log.status.toLowerCase()}`;
                row.insertCell(2).textContent = log.attempts;
                row.insertCell(3).textContent = log.lastAttempt;
                row.insertCell(4).textContent = log.responseCode;
            });
        }

        loadLogs();
    </script>
</body>
</html>
