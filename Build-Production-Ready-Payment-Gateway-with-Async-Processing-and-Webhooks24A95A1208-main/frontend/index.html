<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #007bff;
            text-align: center;
            margin-bottom: 30px;
        }
        .section {
            margin-bottom: 30px;
            padding: 20px;
            background-color: #ffffff;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .section h2 {
            color: #007bff;
            margin-top: 0;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #007bff;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Merchant Dashboard</h1>

        <div class="section">
            <h2>API Credentials</h2>
            <p><strong>API Key:</strong> key_test_abc123</p>
            <p><strong>API Secret:</strong> secret_test_xyz789</p>
        </div>

        <div class="section">
            <h2>Webhook Configuration</h2>
            <input type="text" id="webhookUrl" placeholder="Enter webhook URL">
            <button onclick="saveWebhook()">Save</button>
            <p><strong>Webhook Secret:</strong> webhook_secret_xyz</p>
        </div>

        <div class="section">
            <h2>Webhook Logs</h2>
            <table id="webhookLogs">
                <thead>
                    <tr>
                        <th>Event</th>
                        <th>Status</th>
                        <th>Attempts</th>
                        <th>Last Attempt</th>
                        <th>Response Code</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Logs will be populated here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function saveWebhook() {
            const url = document.getElementById('webhookUrl').value;
            // In real app, make API call
            alert('Webhook saved: ' + url);
        }

        // Mock data
        const mockLogs = [
            { event: 'payment.success', status: 'SUCCESS', attempts: 1, lastAttempt: '2024-01-01', responseCode: 200 },
            { event: 'payment.failed', status: 'FAILED', attempts: 3, lastAttempt: '2024-01-01', responseCode: 500 }
        ];

        function loadLogs() {
            const tbody = document.querySelector('#webhookLogs tbody');
            mockLogs.forEach(log => {
                const row = tbody.insertRow();
                row.insertCell(0).textContent = log.event;
                row.insertCell(1).textContent = log.status;
                row.insertCell(2).textContent = log.attempts;
                row.insertCell(3).textContent = log.lastAttempt;
                row.insertCell(4).textContent = log.responseCode;
            });
        }

        loadLogs();
    </script>
</body>
</html>
